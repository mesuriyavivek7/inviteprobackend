services:
  invitepro-backend:
    container_name: invitepro-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3010}:3010"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    container_name: invitepro-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
